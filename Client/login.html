<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SMSI - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div style="background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); text-align: center;">
        <h2>SMSI Login</h2>
        <br>
        <input type="text" id="username" placeholder="Username" style="display: block; width: 100%; margin-bottom: 10px; padding: 10px;">
        
        <input type="password" id="accessCode" placeholder="Access Code" style="display: block; width: 100%; margin-bottom: 20px; padding: 10px;">
        
        <button onclick="loginVerify()" class="btn" style="display: inline-block; width: 100%; cursor: pointer; border: none; padding: 10px;">Login</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
